version: '3.9'

services:

 backend:
  build:
    context: ./backend
    dockerfile: dockerfile
  container_name: backend
  expose:
   - 8000
  networks:
   - app-network

 
 frontend_app:
  build:
    context: ./frontend
    dockerfile: dockerfile
  container_name : frontend
  expose:
    - 5173
  networks:
   - app-network

 nginix:
  image: nginx:alpine
  container_name: nginx
  ports:
    - "80:80"
  volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  depends_on:
   - backend
   - frontend_app
  networks:
   - app-network

networks:
 app-network:
  driver: bridge

  
  