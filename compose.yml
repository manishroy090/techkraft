version: '3.9'

services:
 frontend_app:
  build:
    context: ./frontend
    dockerfile: dockerfile
  container_name : frontend
  expose:
    - "5173"
  networks:
   - app-network
  healthcheck:
    test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173/auth/login', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
    interval : 10s
    timeout : 5s
    retries : 3

 backend:
  build:
    context: ./backend
    dockerfile: dockerfile
  container_name: backend
  expose:
   - "8000"
  networks:
   - app-network
  depends_on:
   frontend_app: 
     condition: service_healthy
   
  healthcheck:
   test : ["CMD","curl","-f","http://localhost:8000/"]
   interval : 5s
   timeout : 5s
   retries : 3

 sqlite: 
   image: suriya08/sqlite3:1.0.3
   container_name: sqlite
   volumes:
    - ./data:/sqlite/data
   ports : 
     - "8191:8191"

 nginx:
  image: nginx:alpine
  container_name: nginx
  ports:
    - "80:80"
  volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  depends_on:
    backend:
      condition: service_healthy
    frontend_app: 
      condition: service_healthy
  networks:
   - app-network

networks:
 app-network:
  driver: bridge

  
  